<!-- 博客主体：三栏布局（文章视图）+ 磁贴列表视图 -->
<div class="blog-layout" id="blogLayout">
  <!-- 左侧文件树 -->
  <aside class="blog-sidebar" id="fileTree">
    <div class="sidebar-head">目录</div>
    <nav class="file-tree" id="fileTreeNav"></nav>
  </aside>

  <!-- 中间内容区 -->
  <main class="blog-main" id="blogContent">
    <!-- 默认显示磁贴列表 -->
    <div class="blog-cards-view" id="blogCardsView">
      <div class="section-header">
        <span class="section-tag">文章</span>
        <h2>博客</h2>
        <p>数值仿真、物理信息学习与工程计算的思考。</p>
      </div>
      <div class="blog-grid" id="allBlogGrid"></div>
    </div>
    <!-- 文章详情视图（默认隐藏） -->
    <div class="blog-article-view" id="blogArticleView" style="display:none;">
      <button class="back-to-list" id="backToList">← 返回列表</button>
      <div id="articleContainer"></div>
    </div>
  </main>

  <!-- 右侧文章目录 -->
  <aside class="blog-toc" id="blogToc">
    <div class="sidebar-head">本页目录</div>
    <nav class="toc-nav" id="tocNav">
      <p class="toc-empty">选择文章以查看目录</p>
    </nav>
  </aside>
</div>
